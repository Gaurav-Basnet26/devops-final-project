global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["host.docker.internal:19100"]

  - job_name: "employee-app"
    static_configs:
      - targets: ["host.docker.internal:18080"]
